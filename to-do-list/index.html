
<!doctype html>

<head>
  <meta charset="UTF-8" />
  <title> TO-DO-List</title>
  <link rel="stylesheet" href="src/styles/main.css">
  <link rel="stylesheet" href="src/styles/containers.css">
  <link rel="stylesheet" href="src/styles/form.css">
  <link rel="stylesheet" href="src/styles/task.css">
  <link rel="stylesheet" href="src/styles/components.css">
  <link rel="stylesheet" href="src/styles/formInputButton.css">
</head>

<body>
  <header>
    <h1>Список задач</h1>
  </header>
  <div class="wrapper">

    <form id="form-add-and-search-task" class="form-add-and-search-task">
      <div id="input-button-container" class="input-button-container">
        <input id="input-task" class="input" type="text" placeholder="Создание задачу">
        <button id="button-add-task" type="submit">+</button>
      </div>
      <button id="button-search" class="button-search" aria-label=""></button>
    </form>

    <div id="list-task-wrapper" class="list-task-wrapper">
      <ul id="list-task--active">
      </ul>

      <div id='label-task-completed-container' class="label-task-completed-container">
        <h3>Завершенные</h3>
      </div>
      <ul id="list-task--completed">
      </ul>
    </div>

    <div id="list-task-search-container" class="list-task-search-container">
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
